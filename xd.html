<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çok Yakında</title>

<style>
/* Apple tarzı font */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: #ffffff;
  color: #000;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.container {
  max-width: 700px;
  padding: 20px;
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 52px;
  font-weight: 600;
  letter-spacing: -1px;
  opacity: 0;
  transform: translateY(20px);
  animation: titleAnim 1.2s ease forwards;
}

.subtitle {
  margin-top: 60px;
  font-size: 20px;
  font-weight: 500;
  opacity: 0;
  animation: fadeIn 1.6s ease forwards;
  animation-delay: 0.5s;
}

.divider {
  width: 60px;
  height: 2px;
  background: #000;
  margin: 20px auto;
  opacity: 0;
  animation: fadeIn 1.6s ease forwards;
  animation-delay: 0.7s;
}

.buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeIn 1.6s ease forwards;
  animation-delay: 0.8s;
}

.buttons a {
  text-decoration: none;
  border: 1px solid #000;
  padding: 12px 22px;
  font-size: 15px;
  color: #000;
  border-radius: 10px;
  transition: all 0.25s ease;
  font-weight: 500;
}

.buttons a:hover {
  background: #000;
  color: #fff;
  transform: translateY(-2px);
}

@keyframes titleAnim {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
</style>
</head>

<body>
<div class="container">
  <h1>ÇOK YAKINDA DİĞER YAYINLARLA BURADAYIZ</h1>

  <div class="subtitle">İletişim Adreslerimiz</div>
  <div class="divider"></div>

  <div class="buttons">
    <a href="#">Discord</a>
    <a href="#">Instagram</a>
    <a href="#">Telegram</a>
    <a href="#">Twitter</a>
  </div>
</div>
</body>
</html>
