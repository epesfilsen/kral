<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çok Yakında</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: #ffffff;
  color: #000;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.container {
  max-width: 700px;
  padding: 20px;
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 52px;
  font-weight: 600;
  letter-spacing: -1px;
  opacity: 0;
  transform: translateY(20px);
  animation: titleAnim 1.2s ease forwards;
}

.subtitle {
  margin-top: 60px;
  font-size: 20px;
  font-weight: 500;
  opacity: 0;
  animation: fadeIn 1.6s ease forwards;
  animation-delay: 0.5s;
}

.divider {
  width: 60px;
  height: 2px;
  background: #000;
  margin: 20px auto;
  opacity: 0;
  animation: fadeIn 1.6s ease forwards;
  animation-delay: 0.7s;
}

.buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeIn 1.6s ease forwards;
  animation-delay: 0.8s;
}

.buttons a {
  text-decoration: none;
  border: 1px solid #000;
  padding: 12px 22px;
  font-size: 15px;
  color: #000;
  border-radius: 10px;
  transition: all 0.25s ease;
  font-weight: 500;
  opacity: 0;
  animation: buttonAnim 1s ease forwards;
}

.buttons a:nth-child(1) { animation-delay: 1s; }
.buttons a:nth-child(2) { animation-delay: 1.1s; }
.buttons a:nth-child(3) { animation-delay: 1.2s; }
.buttons a:nth-child(4) { animation-delay: 1.3s; }

.buttons a:hover {
  background: #000;
  color: #fff;
  transform: translateY(-2px);
}

/* YAYINA GİT butonu: diğer butonlarla aynı stil ama 4 kat büyük */
.launch-btn {
  display: inline-block;
  margin-top: 30px;
  padding: 48px 88px; /* 4 kat boyut */
  font-size: 60px; /* 4 kat font büyüklüğü */
  font-weight: 500;
  border-radius: 10px;
  border: 1px solid #000;
  text-decoration: none;
  color: #000;
  transition: all 0.25s ease;
  opacity: 0;
  animation: buttonAnim 1s ease forwards;
  animation-delay: 1.5s;
}

.launch-btn:hover {
  background: #000;
  color: #fff;
  transform: translateY(-2px);
}

/* Animasyonlar */
@keyframes titleAnim {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { to { opacity: 1; } }
@keyframes buttonAnim { to { opacity: 1; } }
</style>
</head>

<body>
<a href="/index.html" style="position:absolute; top:0; left:0; right:0; bottom:0;"></a>

<div class="container">
  <h1>ÇOK YAKINDA DİĞER YAYINLARLA BURADAYIZ</h1>

  <div class="subtitle">İletişim Adreslerimiz</div>
  <div class="divider"></div>

  <div class="buttons">
    <a href="#">Discord</a>
    <a href="#">Instagram</a>
    <a href="#">Telegram</a>
    <a href="#">Twitter</a>
  </div>

  <a class="launch-btn" href="/">YAYINA GİT</a>
</div>
</body>
</html>
